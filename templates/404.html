<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Stránka nenalezena — Commarec</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'DrukCondensed';
      src: url('/static/DrukCondensed-Super.woff2') format('woff2'),
           url('/static/DrukCondensed-Super.otf') format('opentype');
      font-weight: 900; font-style: normal;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #173767; --cyan: #00AFF0; --cyan-dark: #008ABD;
      --bg: #F0F3F7; --surface: #FFFFFF; --border: #D0DAE8;
      --text: #0E213E; --muted: #4A6080; --radius: 6px;
      --font-display: 'DrukCondensed', 'Impact', sans-serif;
      --font-body: 'Montserrat', sans-serif;
    }
    body { font-family: var(--font-body); background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.6; min-height: 100vh; display: flex; flex-direction: column; }
    a { color: var(--cyan-dark); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .nav { background: #173767; border-bottom: 3px solid #00AFF0; padding: 0 2rem; height: 56px; display: flex; align-items: center; justify-content: space-between; }
    .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .nav-logo img { height: 26px; width: auto; display: block; }
    .nav-logo span { color: rgba(255,255,255,0.4); font-size: 11px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; border-left: 1px solid rgba(255,255,255,0.2); padding-left: 10px; }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .nav-user { font-size: 12px; color: rgba(255,255,255,0.5); font-weight: 500; }
    .nav-user strong { color: white; font-weight: 600; }
    .nav-logout { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.4); padding: 4px 10px; border: 1px solid rgba(255,255,255,0.15); border-radius: 4px; text-transform: uppercase; letter-spacing: 0.05em; transition: all 0.15s; }
    .nav-logout:hover { color: white; border-color: rgba(255,255,255,0.4); text-decoration: none; }
    .error-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 4rem 1.5rem; }
    .error-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 3rem 3.5rem; max-width: 520px; width: 100%; text-align: center; }
    .error-code { font-family: var(--font-display); font-size: 120px; font-weight: 900; letter-spacing: 0.04em; line-height: 1; text-transform: uppercase; background: linear-gradient(to bottom, var(--navy) 60%, var(--cyan) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .error-title { font-family: var(--font-body); font-size: 18px; font-weight: 700; color: var(--navy); margin: 1rem 0 0.5rem; }
    .error-desc { font-size: 14px; color: var(--muted); font-weight: 500; margin-bottom: 2rem; line-height: 1.6; }
    .error-divider { height: 1px; background: var(--border); margin: 1.5rem 0; }
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 18px; border-radius: var(--radius); font-size: 12px; font-weight: 700; cursor: pointer; border: 1.5px solid transparent; transition: all 0.15s; font-family: var(--font-body); text-decoration: none; letter-spacing: 0.04em; text-transform: uppercase; }
    .btn:hover { text-decoration: none; }
    .btn-navy { background: #173767; color: white; border-color: var(--navy); }
    .btn-navy:hover { background: #254f8a; }
    .btn-secondary { background: white; color: var(--navy); border-color: var(--border); }
    .btn-secondary:hover { background: var(--bg); }
    .error-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .error-hint { font-size: 12px; color: var(--muted); margin-top: 1.5rem; }
    .error-hint a { color: var(--cyan-dark); font-weight: 600; }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="{{ url_for('main.home') }}" class="nav-logo">
      <img src="/static/logo-white.svg" alt="Commarec">
      <span>Zápisy</span>
    </a>
    {% if session.user_id %}
    <div class="nav-right">
      <span class="nav-user"><strong>{{ session.user_name }}</strong></span>
      <a href="{{ url_for('main.logout') }}" class="nav-logout">Odhlásit</a>
    </div>
    {% endif %}
  </nav>
  <div class="error-wrap">
    <div class="error-card">
      <div class="error-code">404</div>
      <div class="error-title">Stránka nenalezena</div>
      <p class="error-desc">Hledaná stránka neexistuje nebo byla přesunuta.<br>Zkontroluj adresu nebo se vrať zpět.</p>
      <div class="error-divider"></div>
      <div class="error-actions">
        <a href="{{ url_for('main.home') }}" class="btn btn-navy">← Zpět na přehled</a>
        <a href="{{ url_for('main.crm_prehled') }}" class="btn btn-secondary">Přehled</a>
      </div>
      <p class="error-hint">Nebo přejdi na <a href="{{ url_for('main.klienti_list') }}">seznam klientů</a>.</p>
    </div>
  </div>
</body>
</html>
