{% extends "base.html" %}
{% block title %}Nový zápis{% endblock %}
{% block extra_head %}
<style>
.templates { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.tmpl { background: white; border: 2px solid var(--border); border-radius: var(--radius); padding: 20px 16px 16px; cursor: pointer; transition: all 0.15s; user-select: none; position: relative; overflow: hidden; }
.tmpl::after { content: ''; position: absolute; right: -12px; top: 50%; transform: translateY(-50%); width: 44px; height: 44px; clip-path: polygon(0 0, 70% 0, 100% 50%, 70% 100%, 0 100%, 30% 50%); opacity: 0; transition: opacity 0.15s; background: #00AFF0; }
.tmpl.selected::after { opacity: 0.15; }
.tmpl:hover { border-color: #00AFF0; box-shadow: 0 2px 12px rgba(0,175,240,0.12); }
.tmpl.selected { border-color: #173767; background: #F0F5FA; }
.tmpl-icon { color: #173767; margin-bottom: 10px; transition: color 0.15s; }
.tmpl.selected .tmpl-icon { color: #00AFF0; }
.tmpl-num { font-family: var(--font-display); font-size: 26px; font-weight: 900; color: var(--border); line-height: 1; margin-bottom: 5px; transition: color 0.15s; }
.tmpl.selected .tmpl-num { color: #00AFF0; }
.tmpl-name { font-size: 13px; font-weight: 700; color: var(--navy); margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.04em; }
.tmpl-desc { font-size: 11px; color: var(--muted); line-height: 1.5; font-weight: 500; }
.step-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.step-num { font-family: var(--font-display); font-size: 22px; font-weight: 900; color: var(--cyan); line-height: 1; }
.step-label { font-size: 11px; font-weight: 700; color: var(--navy); text-transform: uppercase; letter-spacing: 0.08em; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
.blocks-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.block-check { display: flex; align-items: center; gap: 8px; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: var(--radius); cursor: pointer; transition: all 0.15s; user-select: none; }
.block-check:hover { border-color: var(--cyan); }
.block-check.checked { border-color: var(--navy); background: #F0F5FA; }
.block-check input { display: none; }
.block-dot { width: 16px; height: 16px; border: 2px solid var(--border); border-radius: 3px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.block-check.checked .block-dot { background: var(--navy); border-color: var(--navy); }
.block-dot::after { content: '✓'; font-size: 10px; color: white; display: none; font-weight: 700; }
.block-check.checked .block-dot::after { display: block; }
.block-label { font-size: 12px; font-weight: 600; color: var(--navy); }
.block-icon { flex-shrink:0; color: #4A6080; }
.block-check.checked .block-icon { color: #00AFF0; }
.required-field.error { border-color: #C0392B !important; background: #fff8f8; }
.field-error-msg { color: #C0392B; font-size: 11px; font-weight: 600; margin-top: 4px; display: none; }
.required-field.error + .field-error-msg { display: block; }
@media (max-width: 600px) { .templates, .form-grid, .form-grid-3, .blocks-grid { grid-template-columns: 1fr; } }

/* LOADING OVERLAY */
#loading-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(14,33,62,0.96);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 32px;
}
#loading-overlay.active { display: flex; }
.loading-logo { height: 36px; width: auto; opacity: 0.85; }
.loading-title {
  font-family: 'Montserrat', sans-serif;
  font-size: 60px;
  font-weight: 900;
  color: white;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  line-height: 1.0;
  text-align: center;
}
.loading-sub {
  font-size: 13px;
  color: rgba(255,255,255,0.5);
  text-transform: uppercase;
  letter-spacing: 0.15em;
  font-weight: 700;
  text-align: center;
  margin-top: 4px;
}
.loading-bar-wrap {
  width: 280px;
  height: 3px;
  background: rgba(255,255,255,0.1);
  border-radius: 2px;
  overflow: hidden;
}
.loading-bar {
  height: 100%;
  background: #00AFF0;
  border-radius: 2px;
  animation: loadbar 3s ease-in-out infinite alternate;
  width: 30%;
}
@keyframes loadbar {
  0%   { width: 10%; margin-left: 0; }
  50%  { width: 60%; margin-left: 20%; }
  100% { width: 20%; margin-left: 70%; }
}
.loading-dots {
  display: flex;
  gap: 8px;
}
.loading-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #00AFF0;
  animation: dotpulse 1.2s ease-in-out infinite;
}
.loading-dot:nth-child(2) { animation-delay: 0.2s; }
.loading-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes dotpulse {
  0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
  40% { transform: scale(1); opacity: 1; }
}

/* Freelo kontext panel */
.fl-k-task { display:flex; align-items:flex-start; gap:8px; padding:8px 10px; border-radius:5px; margin-bottom:4px; background:#fafbfd; border:1px solid var(--border); cursor:pointer; transition:background 0.1s; }
.fl-k-task:hover { background:#f0f5fb; }
.fl-k-task.checked { background:#f0fbf5; border-color:#b8e8cb; }
.fl-k-task input[type=checkbox] { margin-top:2px; accent-color:var(--cyan); width:14px; height:14px; flex-shrink:0; }
.fl-k-task-body { flex:1; min-width:0; }
.fl-k-task-name { font-size:13px; font-weight:600; color:var(--navy); }
.fl-k-task-meta { font-size:11px; color:var(--muted); margin-top:2px; display:flex; gap:8px; flex-wrap:wrap; }
.fl-k-task-desc { font-size:11px; color:var(--muted); margin-top:4px; padding:4px 8px; background:white; border-radius:3px; border-left:2px solid var(--border); display:none; }
.fl-k-task.has-detail .fl-k-task-desc { display:block; }
.fl-k-badge { font-size:10px; padding:1px 6px; border-radius:8px; font-weight:700; }
.fl-k-badge-done { background:#e8f8ef; color:#0A7A5A; }
.fl-k-badge-open { background:#e8f4fb; color:#007ab8; }

// Notes
let noteIdx = 0;
function addNote() {
  const c = document.getElementById('notes-container');
  const idx = noteIdx++;
  const div = document.createElement('div');
  div.id = 'note-' + idx;
  div.style.cssText = 'display:grid;grid-template-columns:180px 1fr auto;gap:8px;margin-bottom:8px;align-items:start;';
  div.innerHTML = `
    <input type="text" placeholder="Titulek (Např. Sklad)" class="note-title" style="padding:8px 10px;border:1.5px solid var(--border);border-radius:5px;font-size:13px;font-family:'Montserrat',sans-serif;">
    <textarea placeholder="Text poznamky..." class="note-text" rows="2" style="resize:vertical;padding:8px 10px;border:1.5px solid var(--border);border-radius:5px;font-size:13px;font-family:'Montserrat',sans-serif;"></textarea>
    <button onclick="document.getElementById('note-${idx}').remove()" style="padding:6px 10px;border:1.5px solid #f0bcbc;border-radius:5px;background:white;color:#C0392B;cursor:pointer;font-size:16px;margin-top:2px;">&times;</button>`;
  c.appendChild(div);
}
function getNotes() {
  const notes = [];
  document.querySelectorAll('#notes-container > div').forEach(div => {
    const title = div.querySelector('.note-title')?.value.trim() || 'Poznámka';
    const text  = div.querySelector('.note-text')?.value.trim() || '';
    if (text) notes.push({ title, text });
  });
  return notes;
}

/* ══════════════════════════════════════════
   FREELO KONTEXT — načtení a výběr úkolů
   ══════════════════════════════════════════ */
let flKontextTasks = [];

async function loadFreeloKontext(klientId) {
  if (!klientId) {
    document.getElementById('freelo-kontext-card').style.display = 'none';
    return;
  }
  const card = document.getElementById('freelo-kontext-card');
  const loading = document.getElementById('freelo-kontext-loading');
  const contentEl = document.getElementById('freelo-kontext-content');
  const emptyEl = document.getElementById('freelo-kontext-empty');

  card.style.display = 'block';
  loading.style.display = 'block';
  contentEl.style.display = 'none';
  emptyEl.style.display = 'none';
  flKontextTasks = [];

  try {
    console.log('[Freelo] Načítám kontext pro klienta', klientId);
    const d = await fetch(`/api/klient/${klientId}/freelo-kontext`).then(r => r.json());
    console.log('[Freelo] Odpověď:', d);
    loading.style.display = 'none';

    if (!d.ok || !d.tasks || d.tasks.length === 0) {
      emptyEl.style.display = 'block';
      if (d.not_configured) {
        emptyEl.textContent = 'Klient nemá nastavený Freelo tasklist — nastav ho v detailu klienta.';
      } else if (d.error) {
        emptyEl.textContent = 'Chyba načítání Freelo: ' + d.error;
      } else {
        emptyEl.textContent = 'Žádné Freelo úkoly k dispozici pro tohoto klienta.';
      }
      return;
    }

    flKontextTasks = d.tasks;
    const doneTasks = d.tasks.filter(t => t.state === 'done');
    const openTasks = d.tasks.filter(t => t.state === 'open');

    // Poslední zápis info
    const badge = document.getElementById('freelo-kontext-badge');
    if (d.last_zapis_date) {
      const dt = d.last_zapis_date.slice(0, 10);
      badge.textContent = `od posledního zápisu: ${dt}`;
    }

    // Render dokončené
    const doneSection = document.getElementById('freelo-done-section');
    const doneList = document.getElementById('freelo-done-list');
    if (doneTasks.length > 0) {
      doneSection.style.display = 'block';
      document.getElementById('freelo-done-count').textContent = doneTasks.length;
      doneList.innerHTML = doneTasks.map(t => renderFlKTask(t)).join('');
    }

    // Render aktivní
    const openSection = document.getElementById('freelo-open-section');
    const openList = document.getElementById('freelo-open-list');
    if (openTasks.length > 0) {
      openSection.style.display = 'block';
      document.getElementById('freelo-open-count').textContent = openTasks.length;
      openList.innerHTML = openTasks.map(t => renderFlKTask(t)).join('');
    }

    contentEl.style.display = 'block';
  } catch(e) {
    loading.style.display = 'none';
    emptyEl.style.display = 'block';
    emptyEl.textContent = 'Nepodařilo se načíst Freelo úkoly.';
  }
}

function renderFlKTask(t) {
  const hasDetail = t.description || (t.comments && t.comments.length > 0);
  const meta = [];
  if (t.assignee) meta.push(`👤 ${t.assignee}`);
  if (t.deadline) meta.push(`📅 ${t.deadline.slice(0, 10)}`);
  if (t.date_finished) meta.push(`✓ ${t.date_finished.slice(0, 10)}`);
  if (t.comments_count > 0) meta.push(`💬 ${t.comments_count}`);

  let detailHtml = '';
  if (t.description) {
    const desc = t.description.replace(/<[^>]+>/g, '').slice(0, 200);
    detailHtml += `<div style="margin-bottom:3px;">${desc}</div>`;
  }
  if (t.comments && t.comments.length > 0) {
    detailHtml += t.comments.slice(0, 3).map(c =>
      `<div style="color:#4A6080;margin-top:2px;"><strong>${c.author || '?'}:</strong> ${(c.content || '').replace(/<[^>]+>/g, '').slice(0, 120)}</div>`
    ).join('');
  }

  return `<div class="fl-k-task ${hasDetail ? 'has-detail' : ''}" onclick="flKontextToggle(this, ${t.id})">
    <input type="checkbox" data-task-id="${t.id}" onchange="flKontextCheck(this)" onclick="event.stopPropagation()">
    <div class="fl-k-task-body">
      <div class="fl-k-task-name">${t.name}</div>
      ${meta.length ? `<div class="fl-k-task-meta">${meta.join(' · ')}</div>` : ''}
      ${detailHtml ? `<div class="fl-k-task-desc">${detailHtml}</div>` : ''}
    </div>
  </div>`;
}

function flKontextToggle(el, taskId) {
  const cb = el.querySelector('input[type=checkbox]');
  cb.checked = !cb.checked;
  el.classList.toggle('checked', cb.checked);
}

function flKontextCheck(cb) {
  cb.closest('.fl-k-task').classList.toggle('checked', cb.checked);
}

function flKontextVse(val) {
  document.querySelectorAll('.fl-k-task input[type=checkbox]').forEach(cb => {
    cb.checked = val;
    cb.closest('.fl-k-task').classList.toggle('checked', val);
  });
}

function getSelectedFreeloKontext() {
  const selectedIds = new Set();
  document.querySelectorAll('.fl-k-task input[type=checkbox]:checked').forEach(cb => {
    selectedIds.add(parseInt(cb.dataset.taskId));
  });
  return flKontextTasks.filter(t => selectedIds.has(t.id));
}

async function onKlientChange() {
  const sel    = document.getElementById('klient-select');
  const opt    = sel.options[sel.selectedIndex];
  const kid    = sel.value;
  // Prefill client info fields - z data atributů nebo API fallback
  const nazev   = opt?.dataset?.nazev   || opt?.text?.trim() || '';
  const kontakt = opt?.dataset?.kontakt || '';
  const adresa  = opt?.dataset?.adresa  || '';

  const nameEl    = document.getElementById('client-name');
  const contactEl = document.getElementById('client-contact');
  const placeEl   = document.getElementById('meeting-place');
  const dateEl    = document.getElementById('meeting-date');

  // Vždy nastav datum pokud není vyplněno
  if (dateEl && !dateEl.value) {
    const today = new Date();
    const yyyy = today.getFullYear();
    const mm = String(today.getMonth()+1).padStart(2,'0');
    const dd = String(today.getDate()).padStart(2,'0');
    dateEl.value = `${yyyy}-${mm}-${dd}`;
  }

  if (kid) {
    // Pokud máme data z option, použij je
    if (nazev && nameEl) { nameEl.value = nazev; nameEl.style.borderColor=''; nameEl.style.background=''; }
    if (kontakt && contactEl) { contactEl.value = kontakt; contactEl.style.borderColor=''; contactEl.style.background=''; }
    if (adresa && placeEl && !placeEl.value) { placeEl.value = adresa; }

    // Fallback: načti info klienta z API pokud pole jsou stále prázdná
    if ((!nameEl?.value || !kontakt) && kid) {
      fetch(`/api/klient/${kid}/info`).then(r => r.ok ? r.json() : null).then(d => {
        if (!d) return;
        const k = d.klient || d;
        if (nameEl && !nameEl.value && k.nazev) { nameEl.value = k.nazev; nameEl.style.borderColor=''; nameEl.style.background=''; }
        if (contactEl && !contactEl.value && k.kontakt) { contactEl.value = k.kontakt; contactEl.style.borderColor=''; contactEl.style.background=''; }
        if (placeEl && !placeEl.value && (k.adresa || k.sidlo)) { placeEl.value = k.adresa || k.sidlo; }
      }).catch(() => {});
    }
  }

  // Show info bar
  const bar = document.getElementById('klient-info-bar');
  if (kid && nazev) {
    bar.style.display = 'block';
    bar.innerHTML = `<strong style="color:#173767;">${nazev}</strong>${kontakt ? ' — ' + kontakt : ''} &nbsp;·&nbsp; <a href="/klient/${kid}" target="_blank" style="color:#00AFF0;font-size:11px;">Otevřít profil klienta →</a>`;
  } else {
    bar.style.display = 'none';
  }

  // Load projekty
  const psel = document.getElementById('projekt-select');
  const prow = document.getElementById('projekt-row');
  if (!kid) {
    prow.style.display = 'none';
    psel.innerHTML = '<option value="">— Bez projektu —</option>';
    return;
  }
  prow.style.display = 'block';
  psel.innerHTML = '<option value="">Načítám...</option>';
  try {
    const data = await fetch(`/novy/projekty/${kid}`).then(r=>r.json());
    psel.innerHTML = '<option value="">— Bez projektu —</option>' +
      (data.length ? data.map(p => `<option value="${p.id}">${p.nazev}</option>`).join('') : '');
  } catch(e) {
    psel.innerHTML = '<option value="">— Bez projektu —</option>';
  }
  // Načti Freelo kontext pro vybraného klienta
  const flKid = document.getElementById("klient-select")?.value;
  loadFreeloKontext(flKid || null);
}

function loadProjekty() { return onKlientChange(); }

let selectedTemplate = 'audit';
const tmplNames = {"audit": "Audit", "operativa": "Operativní schůzka", "obchod": "Obchodní schůzka"};
// Sekce per typ šablony — odpovídají TEMPLATE_SECTIONS v app.py
// Sekce per typ šablony — klíče odpovídají block-check onclick hodnotám
const TEMPLATE_SECTIONS = {
  'audit':     ['uvod','zjisteni','hodnoceni','procesy','rizika','kroky','prinosy','poznamky'],
  'operativa': ['uvod','zjisteni','rizika','kroky','poznamky'],
  'obchod':    ['uvod','zjisteni','kroky','prinosy','poznamky','dalsi_krok'],
};
const activeBlocks = new Set(TEMPLATE_SECTIONS[selectedTemplate] || TEMPLATE_SECTIONS['audit']);

const LOADING_MSGS = [
  'Analyzuji přepis schůzky...',
  'Identifikuji klíčová zjištění...',
  'Strukturuji doporučené kroky...',
  'Připravuji úkoly pro Freelo...',
  'Finalizuji zápis...',
];
let loadingMsgInterval = null;

function showLoading() {
  const overlay = document.getElementById('loading-overlay');
  overlay.classList.add('active');
  let i = 0;
  document.getElementById('loading-msg').textContent = LOADING_MSGS[0];
  loadingMsgInterval = setInterval(() => {
    i = (i + 1) % LOADING_MSGS.length;
    document.getElementById('loading-msg').textContent = LOADING_MSGS[i];
  }, 4000);
}

function hideLoading() {
  document.getElementById('loading-overlay').classList.remove('active');
  if (loadingMsgInterval) { clearInterval(loadingMsgInterval); loadingMsgInterval = null; }
}

function selectTmpl(el, tmpl) {
  document.querySelectorAll('.tmpl').forEach(t => t.classList.remove('selected'));
  el.classList.add('selected');
  selectedTemplate = tmpl;

  // Aktualizuj aktivní sekce podle šablony
  const sections = TEMPLATE_SECTIONS[tmpl] || TEMPLATE_SECTIONS['audit'];
  activeBlocks.clear();
  sections.forEach(s => activeBlocks.add(s));

  // Aktualizuj vizuální stav checkboxů
  document.querySelectorAll('.block-check').forEach(el => {
    // Extrahuj klíč sekce z onclick atributu
    const match = el.getAttribute('onclick') && el.getAttribute('onclick').match(/'([^']+)'/);
    if (!match) return;
    const key = match[1];
    if (activeBlocks.has(key)) {
      el.classList.add('checked');
    } else {
      el.classList.remove('checked');
    }
  });
}

function toggleBlock(el, key) {
  el.classList.toggle('checked');
  if (activeBlocks.has(key)) activeBlocks.delete(key);
  else activeBlocks.add(key);
}


async function generovat() {
  const text = document.getElementById('input-text').value.trim();
  if (!text) { alert('Vložte prosím text schůzky.'); return; }

  // Validate required fields
  const required = ['client-name', 'client-contact', 'commarec-rep', 'meeting-date', 'meeting-place'];
  const labels = {
    'client-name': 'Název firmy / klienta',
    'client-contact': 'Kontaktní osoba klienta',
    'commarec-rep': 'Za Commarec',
    'meeting-date': 'Datum schůzky'
  };
  let hasError = false;
  required.forEach(id => {
    const el = document.getElementById(id);
    if (!el.value.trim()) {
      el.classList.add('error');
      el.style.borderColor = '#C0392B';
      el.style.background = '#fff8f8';
      hasError = true;
      el.addEventListener('input', () => {
        el.classList.remove('error');
        el.style.borderColor = '';
        el.style.background = '';
      }, { once: true });
    } else {
      el.classList.remove('error');
      el.style.borderColor = '';
      el.style.background = '';
    }
  });
  if (hasError) {
    const firstError = required.find(id => !document.getElementById(id).value.trim());
    document.getElementById(firstError).focus();
    document.getElementById(firstError).scrollIntoView({ behavior: 'smooth', block: 'center' });
    alert('Vyplňte prosím všechna povinná pole označená *');
    return;
  }

  const btn = document.getElementById('gen-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Generuji...';
  showLoading();

  const clientInfo = {
    client_name: document.getElementById('client-name').value.trim(),
    client_contact: document.getElementById('client-contact').value.trim(),
    commarec_rep: document.getElementById('commarec-rep').value.trim(),
    meeting_date: document.getElementById('meeting-date').value.trim(),
    meeting_place: document.getElementById('meeting-place').value.trim(),
    blocks: Array.from(activeBlocks)
  };
  const klientId = document.getElementById('klient-select')?.value || null;
  const projektId = document.getElementById('projekt-select')?.value || null;
  const interniPrompt = document.getElementById('interni-prompt')?.value.trim() || '';
  const notes = getNotes();

  try {
    const rawResp = await fetch('/api/generovat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ template: selectedTemplate, text, client_info: clientInfo,
        klient_id: klientId || undefined, projekt_id: projektId || undefined,
        interni_prompt: interniPrompt, notes,
        freelo_context: getSelectedFreeloKontext() })
    });
    const rawText = await rawResp.text();
    let data;
    try { data = JSON.parse(rawText); }
    catch(e) {
      hideLoading();
      alert('Chyba serveru: ' + rawText.substring(0, 300));
      btn.disabled = false; btn.textContent = 'Generovat zápis →';
      return;
    }
    if (data.error) {
      hideLoading();
      alert('Chyba: ' + data.error);
      btn.disabled = false; btn.textContent = 'Generovat zápis →';
      return;
    }

    hideLoading();
    // Přesměrovat na detail stránku kde je Freelo panel
    window.location.href = '/zapis/' + data.zapis_id;

  } catch (err) {
    hideLoading();
    alert('Chyba: ' + err.message);
    btn.disabled = false;
    btn.textContent = 'Generovat zápis →';
  }
}

document.addEventListener('DOMContentLoaded', () => {

  const kid = url.searchParams.get('klient_id');
  const pid = url.searchParams.get('projekt_id');
  if (kid) {
    const sel = document.getElementById('klient-select');
    if (sel) { sel.value = kid; onKlientChange().then(() => { if (pid) { const psel = document.getElementById('projekt-select'); if (psel) psel.value = pid; } }); }
  } else {
    // Klient vybrán bez URL parametru (default v selectu)
    const sel = document.getElementById('klient-select');
    if (sel && sel.value) loadFreeloKontext(sel.value);
  }
  // Auto-fill commarec-rep from session name
  const repEl = document.getElementById('commarec-rep');
  if (repEl && !repEl.value) repEl.value = '{{ session.user_name }}';

  // Auto-fill dnešní datum vždy při načtení stránky
  const dateElInit = document.getElementById('meeting-date');
  if (dateElInit && !dateElInit.value) {
    const today = new Date();
    const yyyy = today.getFullYear();
    const mm = String(today.getMonth() + 1).padStart(2, '0');
    const dd = String(today.getDate()).padStart(2, '0');
    dateElInit.value = `${yyyy}-${mm}-${dd}`;
  }
});


</script>
{% endblock %}
